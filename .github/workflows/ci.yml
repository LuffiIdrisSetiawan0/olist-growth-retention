name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: dbt deps
        run: uv run dbt deps --project-dir dbt/olist_warehouse --profiles-dir dbt/olist_warehouse

      - name: dbt parse (Jinja + refs validation, no DB needed)
        run: uv run dbt parse --project-dir dbt/olist_warehouse --profiles-dir dbt/olist_warehouse --target ci
