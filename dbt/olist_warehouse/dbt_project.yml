name: 'olist_warehouse'
version: '1.0.0'
config-version: 2

profile: 'olist_warehouse'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  start_date: '2016-09-01'
  end_date:   '2018-10-31'

models:
  olist_warehouse:
    staging:
      +materialized: view
      +schema: ecom_staging
    intermediate:
      +materialized: ephemeral
      +schema: ecom_staging
    marts:
      +materialized: table
      +schema: ecom_marts
